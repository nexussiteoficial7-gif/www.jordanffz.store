<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jordanffz</title>

<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#060b1a;
  color:white;
}

/* FUNDO */
#particles-js{
  position:fixed;
  width:100%;
  height:100%;
  z-index:-1;
}

/* HEADER */
header{
  text-align:center;
  padding:60px 20px;
}

h1{
  font-size:42px;
  background:linear-gradient(90deg,#4da3ff,#ffffff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* STATS */
.stats{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:15px;
  padding:20px;
}

.stat{
  background:#111a33;
  padding:20px;
  border-radius:10px;
}

/* PRODUTOS */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:15px;
  padding:20px;
}

.card{
  background:#0f162d;
  border-radius:12px;
  overflow:hidden;
  text-align:center;
  cursor:pointer;
}

.card img{
  width:100%;
  height:120px;
  object-fit:contain;
}

.card p{
  padding:10px;
}

/* INFO */
.info{
  padding:20px;
}

.box{
  background:#111a33;
  padding:15px;
  border-radius:10px;
  margin-bottom:10px;
}

/* FOOTER */
footer{
  text-align:center;
  padding:20px;
  color:#4da3ff;
}
</style>
</head>

<body>

<div id="particles-js"></div>

<header>
  <h1>Jordanffz</h1>
  <p>Domine o jogo sem limites</p>
</header>

<!-- STATS -->
<div class="stats">
  <div class="stat">
    <h2 id="clientes">0</h2>
    <p>Clientes</p>
  </div>

  <div class="stat">
    <h2 id="satisfeitos">0</h2>
    <p>Satisfeitos</p>
  </div>

  <div class="stat">
    <h2>4.7 ⭐</h2>
    <p>Avaliação</p>
  </div>

  <div class="stat">
    <h2>+90k</h2>
    <p>Acessos</p>
  </div>
</div>

<!-- PRODUTOS -->
<div class="grid">

  <div class="card" onclick="comprar()">
    <img src="https://upload.wikimedia.org/wikipedia/en/7/73/Trollface.png">
    <p>Sensi iOS</p>
  </div>

  <div class="card" onclick="comprar()">
    <img src="https://upload.wikimedia.org/wikipedia/en/7/73/Trollface.png">
    <p>Sensi Emulador</p>
  </div>

  <div class="card" onclick="comprar()">
    <img src="https://upload.wikimedia.org/wikipedia/en/7/73/Trollface.png">
    <p>Headtrick Emulador</p>
  </div>

  <div class="card" onclick="comprar()">
    <img src="https://upload.wikimedia.org/wikipedia/en/7/73/Trollface.png">
    <p>Headtrick Mobile</p>
  </div>

  <div class="card" onclick="comprar()">
    <img src="https://upload.wikimedia.org/wikipedia/en/7/73/Trollface.png">
    <p>Otimizações</p>
  </div>

</div>

<!-- INFO -->
<div class="info">
  <div class="box">🎧 Suporte 24 horas</div>
  <div class="box">✅ Compra garantida</div>
  <div class="box">⚡ Entrega em até 15 minutos</div>
  <div class="box">📦 Produto correto garantido</div>
</div>

<footer>
  www.jordanffz.store2k26
</footer>

<script>
function comprar(){
 alert("para adiquirir esse produto entre em contato diretamente conosco no nosso discord");
}

// CONTADOR
function animar(id,final){
 let el=document.getElementById(id);
 let c=0;
 let i=setInterval(()=>{
  c+=final/100;
  if(c>=final){
    el.innerText=final.toLocaleString();
    clearInterval(i);
  }else{
    el.innerText=Math.floor(c).toLocaleString();
  }
 },20);
}

animar("clientes",5627);
animar("satisfeitos",5122);

// RETÍCULAS
particlesJS("particles-js", {
  particles:{
    number:{value:60},
    color:{value:"#4da3ff"},
    opacity:{value:0.1},
    size:{value:1},
    line_linked:{
      enable:true,
      color:"#4da3ff",
      opacity:0.4
    },
    move:{speed:1.5}
  }
});
</script>

</body>
</html>
